<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trading Bot Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    body { background: #0d1117; color: #e6edf3; font-family: 'Segoe UI', system-ui, sans-serif; }
    .navbar-brand { font-weight: 700; font-size: 1.3rem; letter-spacing: 1px; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; }
    .stat-value { font-size: clamp(1.3rem, 2.5vw, 2rem); font-weight: 700; white-space: nowrap; }
    .stat-label { font-size: 0.8rem; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; }
    .green  { color: #3fb950; }
    .red    { color: #f85149; }
    .badge-open   { background: #1a7f37; color: #fff; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; }
    .badge-closed { background: #6e7681; color: #fff; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; }
    table { font-size: 0.88rem; }
    thead th { color: #8b949e; font-weight: 500; border-color: #30363d !important; }
    tbody td { border-color: #21262d !important; vertical-align: middle; }
    .pnl-pos { color: #3fb950; font-weight: 600; }
    .pnl-neg { color: #f85149; font-weight: 600; }
    .ticker-badge { background: #1f2937; border-radius: 6px; padding: 2px 8px; font-weight: 600; font-size: 0.8rem; }
    #refresh-countdown { font-size: 0.75rem; color: #8b949e; }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark px-4 py-3" style="background:#161b22; border-bottom:1px solid #30363d;">
  <span class="navbar-brand">📈 Trading Bot</span>
  <div class="d-flex align-items-center gap-3">
    <span id="market-badge" class="badge-closed">● MARKET CLOSED</span>
    <span id="refresh-countdown">Refreshing in 30s</span>
    <span class="text-muted" id="last-updated" style="font-size:0.75rem;"></span>
  </div>
</nav>

<div class="container-fluid px-4 py-4">

  <!-- Stat Cards -->
  <div class="row g-3 mb-4">
    <div class="col-6 col-md-3">
      <div class="card p-3 h-100">
        <div class="stat-label mb-1">Portfolio Value</div>
        <div class="stat-value" id="portfolio-value">—</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card p-3 h-100">
        <div class="stat-label mb-1">Today P&amp;L</div>
        <div class="stat-value" id="today-pnl">—</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card p-3 h-100">
        <div class="stat-label mb-1">All-Time P&amp;L</div>
        <div class="stat-value" id="total-pnl">—</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card p-3 h-100">
        <div class="stat-label mb-1">Win Rate</div>
        <div class="stat-value" id="win-rate">—</div>
        <div id="wl-detail" style="font-size:0.8rem; color:#8b949e;"></div>
      </div>
    </div>
  </div>

  <!-- Charts Row -->
  <div class="row g-3 mb-4">
    <!-- Equity Curve -->
    <div class="col-12 col-lg-7">
      <div class="card p-3 h-100">
        <div class="mb-2 fw-600" style="color:#8b949e; font-size:0.85rem; text-transform:uppercase; letter-spacing:1px;">Portfolio Equity Curve</div>
        <canvas id="equityChart" height="200"></canvas>
      </div>
    </div>
    <!-- Win/Loss + Strategy -->
    <div class="col-12 col-lg-5">
      <div class="row g-3 h-100">
        <div class="col-6">
          <div class="card p-3 h-100">
            <div class="mb-2" style="color:#8b949e; font-size:0.85rem; text-transform:uppercase; letter-spacing:1px;">Win / Loss</div>
            <canvas id="winLossChart"></canvas>
          </div>
        </div>
        <div class="col-6">
          <div class="card p-3 h-100">
            <div class="mb-2" style="color:#8b949e; font-size:0.85rem; text-transform:uppercase; letter-spacing:1px;">By Strategy</div>
            <canvas id="strategyChart"></canvas>
          </div>
        </div>
        <div class="col-12">
          <div class="card p-3">
            <div class="mb-2" style="color:#8b949e; font-size:0.85rem; text-transform:uppercase; letter-spacing:1px;">P&amp;L by Ticker</div>
            <canvas id="tickerChart" height="100"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Trade History -->
  <div class="card p-3">
    <div class="mb-3" style="color:#8b949e; font-size:0.85rem; text-transform:uppercase; letter-spacing:1px;">Trade History</div>
    <div class="table-responsive">
      <table class="table table-hover mb-0">
        <thead>
          <tr>
            <th>Time</th>
            <th>Ticker</th>
            <th>Strategy</th>
            <th class="text-end">Qty</th>
            <th class="text-end">Entry</th>
            <th class="text-end">Exit</th>
            <th class="text-end">P&amp;L</th>
            <th class="text-end">P&amp;L %</th>
            <th>Reason</th>
          </tr>
        </thead>
        <tbody id="trade-table-body">
          <tr><td colspan="9" class="text-center text-muted py-4">No trades yet — bot will populate this when markets open</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div><!-- /container -->

<script>
let equityChart, winLossChart, strategyChart, tickerChart;
let countdown = 30;

function fmt(n, cents=true) {
  return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: cents ? 2 : 0, maximumFractionDigits: cents ? 2 : 0 }).format(n);
}
function pnlClass(n) { return n >= 0 ? 'pnl-pos' : 'pnl-neg'; }
function pnlStr(n)   { return (n >= 0 ? '+' : '') + fmt(n); }

function initCharts() {
  const gridColor = '#21262d';
  const textColor = '#8b949e';

  equityChart = new Chart(document.getElementById('equityChart'), {
    type: 'line',
    data: { labels: [], datasets: [{ label: 'Portfolio Value', data: [], borderColor: '#58a6ff', backgroundColor: 'rgba(88,166,255,0.08)', fill: true, tension: 0.3, pointRadius: 2 }] },
    options: {
      responsive: true, animation: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: textColor, maxTicksLimit: 8 }, grid: { color: gridColor } },
        y: { ticks: { color: textColor, callback: v => '$' + v.toLocaleString() }, grid: { color: gridColor } }
      }
    }
  });

  winLossChart = new Chart(document.getElementById('winLossChart'), {
    type: 'doughnut',
    data: { labels: ['Wins', 'Losses'], datasets: [{ data: [0, 0], backgroundColor: ['#3fb950', '#f85149'], borderWidth: 0 }] },
    options: { responsive: true, plugins: { legend: { labels: { color: textColor, boxWidth: 12 } } }, cutout: '65%' }
  });

  strategyChart = new Chart(document.getElementById('strategyChart'), {
    type: 'doughnut',
    data: { labels: [], datasets: [{ data: [], backgroundColor: ['#58a6ff','#d2a8ff','#ffa657','#3fb950'], borderWidth: 0 }] },
    options: { responsive: true, plugins: { legend: { labels: { color: textColor, boxWidth: 12 } } }, cutout: '55%' }
  });

  tickerChart = new Chart(document.getElementById('tickerChart'), {
    type: 'bar',
    data: { labels: [], datasets: [{ label: 'P&L', data: [], backgroundColor: [] }] },
    options: {
      responsive: true, indexAxis: 'y', animation: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: textColor, callback: v => '$' + v }, grid: { color: gridColor } },
        y: { ticks: { color: textColor }, grid: { color: 'transparent' } }
      }
    }
  });
}

async function refresh() {
  try {
    const [stats, trades] = await Promise.all([
      fetch('/api/stats').then(r => r.json()),
      fetch('/api/trades').then(r => r.json()),
    ]);

    // Cards
    document.getElementById('portfolio-value').textContent = fmt(stats.portfolio_value, false);
    const todayEl = document.getElementById('today-pnl');
    todayEl.textContent = pnlStr(stats.today_pnl);
    todayEl.className = 'stat-value ' + pnlClass(stats.today_pnl);

    const totalEl = document.getElementById('total-pnl');
    totalEl.textContent = pnlStr(stats.total_pnl);
    totalEl.className = 'stat-value ' + pnlClass(stats.total_pnl);

    document.getElementById('win-rate').textContent = stats.win_rate + '%';
    document.getElementById('wl-detail').textContent = `${stats.wins}W / ${stats.losses}L / ${stats.total_trades} trades`;

    // Market badge
    const badge = document.getElementById('market-badge');
    badge.textContent = stats.market_open ? '● MARKET OPEN' : '● MARKET CLOSED';
    badge.className = stats.market_open ? 'badge-open' : 'badge-closed';

    // Last updated
    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();

    // Equity curve
    equityChart.data.labels = stats.equity_curve.map(p => p.date);
    equityChart.data.datasets[0].data = stats.equity_curve.map(p => p.value);
    equityChart.update('none');

    // Win/Loss donut
    winLossChart.data.datasets[0].data = [stats.wins, stats.losses];
    winLossChart.update('none');

    // Strategy donut
    const strats = Object.entries(stats.strategy_pnl);
    strategyChart.data.labels = strats.map(([k]) => k);
    strategyChart.data.datasets[0].data = strats.map(([,v]) => Math.abs(v));
    strategyChart.update('none');

    // Ticker bar
    const tickers = Object.entries(stats.ticker_pnl).sort((a,b) => b[1]-a[1]);
    tickerChart.data.labels = tickers.map(([k]) => k);
    tickerChart.data.datasets[0].data = tickers.map(([,v]) => v);
    tickerChart.data.datasets[0].backgroundColor = tickers.map(([,v]) => v >= 0 ? '#3fb950' : '#f85149');
    tickerChart.update('none');

    // Trade table
    const tbody = document.getElementById('trade-table-body');
    if (trades.length === 0) {
      tbody.innerHTML = '<tr><td colspan="9" class="text-center text-muted py-4">No trades yet — bot will populate this when markets open</td></tr>';
    } else {
      tbody.innerHTML = trades.map(t => `
        <tr>
          <td class="text-muted">${t.timestamp}</td>
          <td><span class="ticker-badge">${t.ticker}</span></td>
          <td><span class="badge bg-secondary">${t.strategy || '—'}</span></td>
          <td class="text-end">${t.qty}</td>
          <td class="text-end">$${parseFloat(t.entry_price).toFixed(2)}</td>
          <td class="text-end">${t.exit_price ? '$' + parseFloat(t.exit_price).toFixed(2) : '—'}</td>
          <td class="text-end ${pnlClass(parseFloat(t.pnl))}">${pnlStr(parseFloat(t.pnl))}</td>
          <td class="text-end ${pnlClass(parseFloat(t.pnl))}">${t.pnl_pct || '—'}</td>
          <td class="text-muted" style="font-size:0.78rem;">${t.reason || '—'}</td>
        </tr>`).join('');
    }
  } catch(e) {
    console.error('Refresh error:', e);
  }
}

// Countdown timer
function startCountdown() {
  countdown = 30;
  const el = document.getElementById('refresh-countdown');
  const iv = setInterval(() => {
    countdown--;
    el.textContent = `Refreshing in ${countdown}s`;
    if (countdown <= 0) {
      clearInterval(iv);
      refresh().then(startCountdown);
    }
  }, 1000);
}

initCharts();
refresh().then(startCountdown);
</script>
</body>
</html>
